// [plugins] this block must be the first
plugins {
	// to use the 'api' keyword in dependencies
	id 'java-library'
	// support for groovy
	id 'groovy'
	// awesome git tag / gradle version integration
	id 'pl.allegro.tech.build.axion-release' version '1.21.1'
	// publish on a maven-compatible repository
	id 'maven-publish'
}

// [general] configuration
project.ext {
	groovyGroupId = 'org.apache.groovy'
	groovyVersion = '4.0.29'
}

project.with {
	//project.name is set in the settings.gradle with rootProject.name
	group = 'it.grational.phontastit'
	version = scmVersion.version
	description = "A 'gigawatt' powered project."
}

// [crosscompile] toolchain and target bytecode version
java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
	sourceCompatibility = JavaVersion.VERSION_1_8
	targetCompatibility = JavaVersion.VERSION_1_8
	withSourcesJar()
	withJavadocJar()
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
	options.release = 8
	options.compilerArgs += ['-Xlint:-options']
}

tasks.withType(GroovyCompile).configureEach {
	sourceCompatibility = '8'
	targetCompatibility = '8'
	groovyOptions.configurationScript = file('conf/groovy/compiler-config.groovy')
}

repositories {
	mavenCentral()

	// leverage github as a maven repository
	maven { url 'https://jitpack.io' }
}

dependencies {
	// We use the awesome Spock testing and specification framework
	testImplementation (
		"${groovyGroupId}:groovy:${groovyVersion}",
		"org.spockframework:spock-core:2.3-groovy-4.0",
		"org.junit.platform:junit-platform-launcher"
	)
}

configurations.configureEach {
	resolutionStrategy {
		componentSelection {
			all { ComponentSelection selection ->
				String version = selection.candidate.version
				if (version ==~ /.*[-_.]?(alpha|beta).*/) {
					reject("Rejecting $version as it's an excluded version")
				}
			}
		}
	}
}

publishing {
	publications {
		mavenJava(MavenPublication) {
			groupId = 'com.github.grational'
			artifactId = 'phontastit'
			version = scmVersion.version // '0.5.0' (remove -SNAPSHOT for releases)
			from components.java
		}
	}
}
// [tasks] configuration //
release {
	// test everything before a release
	dependsOn 'test'
}

// [tasks] definition
tasks.withType(Test).configureEach {
	useJUnitPlatform()
	maxParallelForks = Math.max(1, Runtime.runtime.availableProcessors().intdiv(2))
	javaLauncher = javaToolchains.launcherFor {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

tasks.register('uniTest', Test) {
	description = 'unit tests task'
	exclude '**/*ISpec*'
	exclude '**/*FSpec*'
}

tasks.register('intTest', Test) {
	description = 'integration tests task'
	exclude '**/*USpec*'
	exclude '**/*FSpec*'
}

tasks.register('funTest', Test) {
	description = 'functional tests task'
	exclude '**/*USpec*'
	exclude '**/*ISpec*'
}

[8, 11, 17, 21, 25].each { int version ->
	tasks.register("testOnJdk${version}", Test) {
		description = "Runs tests on JDK ${version}"
		javaLauncher = javaToolchains.launcherFor {
			languageVersion = JavaLanguageVersion.of(version)
		}
	}
}

gradle.startParameter.excludedTaskNames += ['uniTest', 'intTest', 'funTest']
